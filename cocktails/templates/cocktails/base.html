<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CocktailDB 검색기{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --accent: #d35400;
      --accent-light: #e8824a;
      --bg: #f4f1ec;
      --card-bg: #ffffff;
      --nav-bg: #2c1a0e;
      --text: #2d2013;
      --text-muted: #7a6652;
      --border: #e0d5c5;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    .navbar {
      background: var(--nav-bg) !important;
      border-bottom: 3px solid var(--accent);
    }
    .navbar-brand {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-light) !important;
      letter-spacing: 1px;
    }
    .nav-link { color: #d4b896 !important; }
    .nav-link:hover { color: var(--accent-light) !important; }

    .search-hero {
      background: linear-gradient(135deg, #3d1f0a 0%, #5c2d0f 50%, #7a3d14 100%);
      padding: 60px 0 50px;
      text-align: center;
    }
    .search-hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      color: #f5d5a0;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .search-hero p { color: #c8a87a; font-size: 1.1rem; }

    .search-box input {
      background: #fff;
      border: 2px solid #c8a87a;
      color: var(--text);
      border-radius: 50px 0 0 50px;
      padding: 12px 20px;
      font-size: 1rem;
    }
    .search-box input::placeholder { color: #b0957a; }
    .search-box input:focus {
      background: #fff;
      border-color: var(--accent);
      color: var(--text);
      box-shadow: none;
    }
    .search-box .btn-search {
      background: var(--accent);
      border: none;
      border-radius: 0 50px 50px 0;
      padding: 12px 24px;
      color: #fff;
      font-weight: 600;
    }
    .search-box .btn-search:hover { background: #b84500; }

    .cocktail-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      height: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .cocktail-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(211,84,0,0.18);
      border-color: var(--accent);
    }
    .cocktail-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .cocktail-card .card-body { padding: 16px; }
    .cocktail-card .card-title {
      font-weight: 700;
      color: var(--text);
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge-glass {
      background: #fdf0e0;
      color: var(--accent);
      border: 1px solid #f0c898;
      font-size: 0.75rem;
      border-radius: 20px;
      padding: 3px 10px;
    }
    .btn-view {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }
    .btn-view:hover { background: #b84500; color: #fff; }

    .category-badge {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 30px;
      padding: 8px 20px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all .15s;
      display: inline-block;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .category-badge:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .ingredient-tag {
      background: #fdf0e0;
      border: 1px solid #f0c898;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.85rem;
      color: var(--accent);
      display: inline-block;
      margin: 3px;
    }

    /* ingredient list in detail */
    .ingredient-row {
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      color: var(--accent);
      font-weight: 700;
    }
    .text-muted-custom { color: var(--text-muted) !important; }

    footer {
      background: var(--nav-bg);
      color: #9a7a5a;
      text-align: center;
      padding: 20px;
      margin-top: 60px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="{% url 'index' %}">
      <i class="bi bi-cup-straw"></i> CocktailDB
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'index' %}"><i class="bi bi-house"></i> 홈</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'search' %}"><i class="bi bi-search"></i> 이름 검색</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'search_by_ingredient' %}"><i class="bi bi-droplet"></i> 재료 검색</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'random' %}"><i class="bi bi-shuffle"></i> 랜덤</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  Powered by <a href="https://www.thecocktaildb.com/" style="color:var(--accent)" target="_blank">TheCocktailDB</a>
  &nbsp;|&nbsp; Built with Django
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
