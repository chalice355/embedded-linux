services:
  mysql:
    image: mysql:8.0
    container_name: speed-camera-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: speed_camera
      MYSQL_USER: camera_user
      MYSQL_PASSWORD: camera_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - speed-camera-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  n8n:
    image: n8nio/n8n:latest
    container_name: speed-camera-n8n
    environment:
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - speed-camera-net

  grafana:
    image: grafana/grafana:latest
    container_name: speed-camera-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - mysql
    networks:
      - speed-camera-net

volumes:
  mysql_data:
  n8n_data:
  grafana_data:

networks:
  speed-camera-net:
    driver: bridge
